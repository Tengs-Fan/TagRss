# Auto-tagging rules
# These rules automatically add tags to articles based on content/metadata

rules:
  # Word count rules
  - type: word_count
    min: 3000
    tag: long

  - type: word_count
    max: 500
    tag: short

  # Content matching rules
  - type: contains
    pattern: "GPT"
    case_sensitive: false
    tag: tech/ai/llm

  - type: contains
    pattern: "LLM"
    case_sensitive: false
    tag: tech/ai/llm

  - type: contains
    pattern: "Rust"
    case_sensitive: true
    tag: tech/programming/rust

  - type: contains
    pattern: "Python"
    case_sensitive: true
    tag: tech/programming/python

  # Freshness rules
  - type: age
    max_days: 1
    tag: fresh

  - type: age
    min_days: 7
    tag: old
